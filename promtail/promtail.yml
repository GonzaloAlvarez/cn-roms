server:
  http_listen_port: 0
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://${INFRA_VPS_TAILNET_IP}:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: '/(cn-roms-[^/]+)'
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      - target_label: host
        replacement: kaiser
      - target_label: stack
        replacement: cn-roms
