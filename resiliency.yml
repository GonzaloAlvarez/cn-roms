# amun-docker resiliency manifest — installs a docker-compose@<stack>
# boot unit + an /etc/cron.d reconcile job. See amun-docker README.
boot:
  enabled: true
  nfs_mount: /home/gonzalo/docker/data/nfs
  binds_to_mount: true
  require_paths:
    - /home/gonzalo/docker/data/nfs/roms/library/roms
  after: [cn-media]
reconcile:
  enabled: true
  schedule: "*/5 * * * *"
